<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#3b1d6e"/>
      <stop offset="100%" stop-color="#1b0f3a"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="55%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff6a1a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- neon target rings -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#a855f7" stroke-width="2.2" opacity="0.55"/>
  <circle cx="32" cy="32" r="15" fill="none" stroke="#ff8a3d" stroke-width="2.2" opacity="0.5"/>
  <!-- 10x wordmark -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26"
        fill="url(#amber)" letter-spacing="-1.5">10x</text>
</svg>
